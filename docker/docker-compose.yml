version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: agent-backend
    ports:
      - "8000:8000"
    environment:
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - AZURE_EMBEDDING_OPENAI_ENDPOINT=${AZURE_EMBEDDING_OPENAI_ENDPOINT}
      - AZURE_EMBEDDING_OPENAI_API_KEY=${AZURE_EMBEDDING_OPENAI_API_KEY}
      - AZURE_EMBEDDING_OPENAI_DEPLOYMENT=${AZURE_EMBEDDING_OPENAI_DEPLOYMENT}
      - AZURE_EMBEDDING_OPENAI_API_VERSION=${AZURE_EMBEDDING_OPENAI_API_VERSION}
      - LOG_LEVEL=INFO
      - SESSION_RETENTION_DAYS=10
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
      - backend-cache:/app/.cache
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: agent-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ../data:/app/data
      - ../sample_prompts.md:/app/sample_prompts.md:ro
    networks:
      - agent-network
    restart: unless-stopped

volumes:
  backend-cache:

networks:
  agent-network:
    driver: bridge
